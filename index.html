<!DOCTYPE html>

<html lang="en">
    
    
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    
    <title>-eagle_bd</title>
    
    
    <style>
        
        body { margin: 0; background: #000; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; touch-action: none; height: 100vh; display: flex; flex-direction: column; }
        
        #header { padding: 8px; font-size: 10px; border-bottom: 1px solid #222; background: #000; }
        
        #viewport { flex-grow: 1; position: relative; width: 100vw; background: #000; }
        
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 100; font-size: 10px; text-shadow: 1px 1px #000; }
        
        #spectrogram { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; opacity: 0.6; pointer-events: none; }
        
        #deck { height: 160px; background: #111; display: grid; grid-template-columns: 1fr 1fr; border-top: 2px solid #00FF41; }
        
        .t-btn { display: flex; align-items: center; justify-content: center; border: 1px solid #222; font-weight: bold; font-size: 14px; -webkit-tap-highlight-color: transparent; color: #00FF41; }
        
        #action { background: #002200; grid-column: span 2; border-bottom: 2px solid #00FF41; font-size: 18px; }
        
        .stat { color: #0088FF; }
        
    </style>
    
    
</head>
    
<body>
    
    <div id="header">-eagle_bd</div>
    
    <div id="viewport">
        
        <div id="ui">
            
            <div>🎯: <span class="stat">1.405s</span></div>
            
            <div>🎢: <span id="drift-ui" class="stat">0.00ms</span></div>
            
            <div>🚥: <span id="ptr-ui" class="stat">0/300</span></div>
            
            <div>🍥: <span id="warp-ui" class="stat">0%</span></div>
            
        </div>
        
        <canvas id="spectrogram"></canvas>
        
    </div>

    <div id="deck">
        
        <div id="action" class="t-btn" ontouchstart="eng(event)">👾</div>
        
        <div class="t-btn" ontouchstart="exportLog()">💾</div>
        
        <div class="t-btn" ontouchstart="location.reload()">⚕️</div>
        
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="points.js"></script>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/(window.innerHeight-160), 0.1, 50000)
        
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        renderer.setSize(window.innerWidth, window.innerHeight - 160);
        
        document.getElementById('viewport').appendChild(renderer.domElement);
        
        camera.position.set(0, 2500, 6000);

        const pGroup = new THREE.Group();
        
        scene.add(pGroup);

        const cvs = document.getElementById('spectrogram');
        
        const ctx = cvs.getContext('2d');
        
        cvs.width = window.innerWidth; cvs.height = 60;

        const audio = new Audio('3.mp3');
        
        let aCtx, aly, dArr, ptr = 0, nxt = 0, state = 0;
        
        const T = 1.405, pts = [];

        window.addEventListener('load', () => {
            
            if(window.SULTAN_DATA) {
                
                ['outer', 'middle', 'inner'].forEach(s => {
                    
                    window.SULTAN_DATA[s].forEach(p => pts.push({ ...p, type: s }));
                });
            }
        });

        function eng(e) {
            
            e.preventDefault();
            
            const btn = document.getElementById('action');
            
            if (state === 0) {
                
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (aCtx.state === 'suspended') aCtx.resume();
                
                aly = aCtx.createAnalyser(); aly.fftSize = 128;
                
                aCtx.createMediaElementSource(audio).connect(aly).connect(aCtx.destination);
                
                dArr = new Uint8Array(aly.frequencyBinCount);
                
                state = 1; btn.innerText = "ENGAGE SYNC";
                
            } else if (state === 1) {
                
                audio.play(); state = 2; btn.style.visibility = "hidden";
                
            }
        }

        function spawn() {
            
            if (ptr >= 300) return;
            
            const p = pts[ptr];
            
            let g, m, y, c;
            
            if (ptr < 100) { y=25; c=0x00FF41; g=new THREE.BoxGeometry(45,45,45); m=new THREE.MeshBasicMaterial({color:c, wireframe:true}); }
                
            else if (ptr < 200) { y=10; c=0xFF00FF; g=new THREE.CylinderGeometry(90,90,30,5); m=new THREE.MeshBasicMaterial({color:c}); }
                
            else { y=4; c=0x00FFFF; g=new THREE.CylinderGeometry(135,135,50,6); m=new THREE.MeshBasicMaterial({color:c}); }
            

            const mesh = new THREE.Mesh(g, m);
            
            mesh.material.opacity = 1.0;
            
            mesh.material.transparent = false;

            const t = new THREE.Vector3(p.x + 1500, y + 1500, p.z + 1500);
            
            const o = new THREE.Vector3(p.x + 1000, y + 1000, p.z + 1000);
            
            const l = new THREE.Vector3(p.x + 500, y + 500, p.z + 500);

            mesh.position.copy(o);
            
            mesh.userData = { o, t, l, s: audio.currentTime, st: 'IN' };
            
            pGroup.add(mesh);
            
            ptr++; document.getElementById('ptr-ui').innerText = ptr + "/300";
        }

        function animate() {
            
            requestAnimationFrame(animate);
            
            if (state === 2 && !audio.paused) {
                aly.getByteFrequencyData(dArr);
                
                const now = audio.currentTime;

                if (now >= nxt && ptr < 300) {
                    
                    document.getElementById('drift-ui').innerText = ((now - nxt)*1000).toFixed(2)+"ms";
                    
                    spawn(); nxt += T;
                }

                let bass = dArr[1];
                
                let warp = 1 + (bass / 150);
                
                document.getElementById('warp-ui').innerText = Math.floor((warp-1)*100) + "%";
                

                pGroup.children.forEach((m, idx) => {
                    
                    let d = m.userData;
                    
                    let pct = (now - d.s) / T;
                    
                    if (pct > 1) pct = 1;

                    if (d.st === 'IN') {
                        
                        m.position.lerpVectors(d.o, d.t, pct);
                        
                        if (pct >= 1) {
                            
                            d.st = 'NEST';
                            
                            if (pGroup.children[idx-1]) pGroup.children[idx-1].userData.st = 'LINGER';
                            
                        }
                    } else if (d.st === 'LINGER' || d.st === 'NEST') {
                        
                        // Stay visible and reactive
                        
                        m.position.lerp(d.l, 0.08);
                        
                        m.scale.set(warp, warp, warp);
                        
                        m.rotation.y += 0.02;
                        
                    }
                    
                });
                

                ctx.clearRect(0,0, cvs.width, cvs.height);

                
                ctx.fillStyle = "#00FF41";

                
                for(let i=0; i<dArr.length; i++) {

                    
                    let h = (dArr[i]/255)*60;
                    
                    ctx.fillRect(i*(cvs.width/dArr.length), 60-h, 2, h);
                    
                }

                
            }
            
            pGroup.rotation.y += 0.003;
            
            renderer.render(scene, camera);
            
        }
        animate();
        
                if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    </script>

    
</body>
    
</html>
