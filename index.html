<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sultan 47 - Offset Test</title>
    <style>
        body { margin: 0; background: #000; color: #00FF41; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        #audit-log { position: absolute; bottom: 160px; left: 10px; width: 350px; height: 120px; overflow: hidden; border-left: 2px solid #0088FF; padding-left: 5px; font-size: 10px; }
        #deck { position: fixed; bottom: 0; width: 100%; height: 150px; background: #111; display: flex; justify-content: center; align-items: center; gap: 30px; border-top: 2px solid #00FF41; }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; cursor: pointer; background: #00FF41; }
    </style>
</head>
<body>
    <div id="ui">
        <div>CALIBRATION MODE</div>
        <div id="count">POINTS: 0 / 300</div>
    </div>
    <div id="audit-log"></div>
    <div id="viewport"></div>
    <div id="deck">
        <button class="btn" onclick="start()"></button>
        <button class="btn" style="background:#FFD700" onclick="exportLog()"></button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);
        camera.position.z = 500;

        const audio = new Audio('3.mp3');
        let audioCtx, analyser, dataArray;
        let spawnPtr = 0;
        let nextMarker = 0;
        const interval = 1.393;
        const logData = [];
        let points = [];
        let activePoint = null;

        function log(msg) {
            logData.push(msg);
            const d = document.createElement('div');
            d.innerText = msg;
            document.getElementById('audit-log').prepend(d);
        }

        function spawn() {
            if (spawnPtr >= 300) return;
            const data = [...window.SULTAN_DATA.inner, ...window.SULTAN_DATA.middle, ...window.SULTAN_DATA.outer][spawnPtr];
            
            const target = new THREE.Vector3(data.x, data.y, data.z);
            const origin = new THREE.Vector3(data.x + 1000, data.y + 1000, data.z + 1000);

            const mesh = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshBasicMaterial({ color: 0x00FF41, transparent: true }));
            mesh.position.copy(origin);
            mesh.userData = { target, origin, start: audio.currentTime, id: data.i, state: 'IN' };

            scene.add(mesh);
            points.push(mesh);
            
            // Displace Previous
            if (activePoint) {
                activePoint.userData.state = 'OUT';
                activePoint.userData.start = audio.currentTime;
            }
            activePoint = mesh;
            
            spawnPtr++;
            document.getElementById('count').innerText = `POINTS: ${spawnPtr} / 300`;
        }

        function start() {
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            audioCtx.createMediaElementSource(audio).connect(analyser).connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            audio.play();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                if (audio.currentTime >= nextMarker) { spawn(); nextMarker += interval; }

                points.forEach((m, i) => {
                    const d = m.userData;
                    const drive = 0.05 + (dataArray[12] / 1200);

                    if (d.state === 'IN') {
                        m.position.lerp(d.target, drive);
                        if (m.position.distanceTo(d.target) < 1) {
                            log(`[LAND] ID:${d.id} DUR:${(audio.currentTime - d.start).toFixed(3)}`);
                            d.state = 'WAIT';
                        }
                    } else if (d.state === 'OUT') {
                        m.position.lerp(d.origin, drive);
                        m.material.opacity -= 0.02;
                        if (m.material.opacity <= 0) {
                            log(`[RETURN] ID:${d.id} DUR:${(audio.currentTime - d.start).toFixed(3)}`);
                            scene.remove(m);
                            points.splice(i, 1);
                        }
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();

        function exportLog() {
            const blob = new Blob([logData.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = 'SULTAN_OFFSET_TEST.txt';
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }
    </script>
</body>
</html>
