<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBM SULTAN 47 - TUNED ASSEMBLY</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; touch-action: none; }
        #monitor-frame { border: 10px solid #222; margin: 10px; background: #000; position: relative; height: 85vh; box-shadow: 0 0 40px rgba(0, 255, 65, 0.2); }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; font-size: 10px; text-shadow: 1px 1px #000; pointer-events: none; }
        #spectrogram { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; opacity: 0.6; pointer-events: none; }
        .controls { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: 1fr 1fr; background: #111; }
        .btn { padding: 20px; text-align: center; border: 1px solid #00FF41; color: #00FF41; cursor: pointer; font-weight: bold; }
        .btn:active { background: #00FF41; color: #000; }
        .val { color: #0088FF; }
        .warn { color: #FF00FF; }
    </style>
</head>
<body>
    <div id="monitor-frame">
        <div id="ui-layer">
            <div>SYNC_TARGET: <span class="val">1.405s</span></div>
            <div>BASS_WARP: <span id="warp-ui" class="val">0%</span></div>
            <div>DRIFT_LOG: <span id="drift-ui" class="warn">0.000ms</span></div>
            <div>ASSEMBLY: <span id="ptr-ui" class="val">0/300</span></div>
        </div>
        <div id="viewport"></div>
        <canvas id="spectrogram"></canvas>
    </div>

    <div class="controls">
        <div class="btn" onclick="engage()">ENGAGE 3.MP3</div>
        <div class="btn" onclick="location.reload()">REBOOT</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>

    <script>
        let audioCtx, analyser, dataArray, source;
        const audio = new Audio('3.mp3');
        const sCanvas = document.getElementById('spectrogram');
        const sCtx = sCanvas.getContext('2d');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/(window.innerHeight*0.85), 0.1, 50000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 20, window.innerHeight * 0.85);
        document.getElementById('viewport').appendChild(renderer.domElement);
        camera.position.set(0, 2500, 6000);

        let particles = [];
        let spawnPtr = 0, nextMarker = 0;
        const T_DUR = 1.405; // Tuned duration
        const masterData = [...window.SULTAN_DATA.outer, ...window.SULTAN_DATA.middle, ...window.SULTAN_DATA.inner];

        function engage() {
            if (audioCtx) { audio.play(); return; }
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            audio.play();
        }

        function spawn() {
            if (spawnPtr >= 300) return;
            const raw = masterData[spawnPtr];
            let geom, mat, yNest, color;

            // Geometry and Color Logic
            if (spawnPtr < 100) { 
                yNest = 25; color = 0x00FF41; // Outer Green
                geom = new THREE.BoxGeometry(45, 45, 45);
                mat = new THREE.MeshBasicMaterial({ color, wireframe: true });
            } else if (spawnPtr < 200) { 
                yNest = 10; color = 0xFF00FF; // Middle Magenta
                geom = new THREE.CylinderGeometry(90, 90, 30, 5); 
                mat = new THREE.MeshBasicMaterial({ color }); 
            } else { 
                yNest = 4; color = 0x00FFFF; // Inner Neon Blue
                geom = new THREE.CylinderGeometry(135, 135, 50, 6); 
                mat = new THREE.MeshBasicMaterial({ color }); 
            }

            const mesh = new THREE.Mesh(geom, mat);
            mesh.material.opacity = 1.0;
            mesh.material.transparent = false;

            const target = new THREE.Vector3(raw.x, yNest, raw.z);
            const origin = new THREE.Vector3(raw.x + 1000, yNest + 1000, raw.z + 1000);
            const linger = new THREE.Vector3(raw.x + 500, yNest + 500, raw.z + 500);

            mesh.position.copy(origin);
            mesh.userData = { origin, target, linger, startTime: audio.currentTime, state: 'IN' };
            
            scene.add(mesh);
            particles.push(mesh);
            spawnPtr++;
            document.getElementById('ptr-ui').innerText = spawnPtr + "/300";
        }

        function animate() {
            requestAnimationFrame(animate);
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                const now = audio.currentTime;
                
                // Audio Warp Logic
                let bass = dataArray[1];
                let warp = 1 + (bass / 150);
                document.getElementById('warp-ui').innerText = Math.floor((warp-1)*100) + "%";

                // Live Spectrogram
                sCtx.clearRect(0,0, sCanvas.width, sCanvas.height);
                for(let i=0; i<dataArray.length; i++) {
                    sCtx.fillStyle = `rgb(0, ${dataArray[i]}, ${255 - dataArray[i]})`;
                    sCtx.fillRect(i * (sCanvas.width/dataArray.length), sCanvas.height, 2, -dataArray[i]/2);
                }

                if (now >= nextMarker && spawnPtr < 300) {
                    let drift = (now - nextMarker) * 1000;
                    document.getElementById('drift-ui').innerText = drift.toFixed(3) + "ms";
                    spawn();
                    nextMarker += T_DUR;
                }

                particles.forEach((m, idx) => {
                    let d = m.userData;
                    let pct = (now - d.startTime) / T_DUR;
                    if (pct > 1) pct = 1;

                    if (d.state === 'IN') {
                        m.position.lerpVectors(d.origin, d.target, pct);
                        if (pct >= 1) {
                            d.state = 'NEST';
                            if (particles[idx-1]) particles[idx-1].userData.state = 'LINGER';
                        }
                    } else if (d.state === 'LINGER') {
                        m.position.lerp(d.linger, 0.08);
                        m.scale.set(warp, warp, warp);
                        m.rotation.y += 0.02;
                    }
                });
                scene.rotation.y += 0.003; // Depth rotation
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
