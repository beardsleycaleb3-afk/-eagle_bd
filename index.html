<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBM SULTAN 47 - FULL MOBILE SUITE</title>
    <style>
        body { margin: 0; background: #010801; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
        #monitor-border { border: 12px solid #222; border-radius: 20px; padding: 10px; background: #000; box-shadow: 0 0 50px rgba(0, 255, 65, 0.2); position: relative; margin-bottom: 160px; }
        #viewport { width: 320px; height: 320px; overflow: hidden; border: 1px solid #00FF41; background: #000; position: relative; }
        #ui { position: absolute; top: -150px; left: 0; width: 320px; font-size: 9px; line-height: 1.2; }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 2px 0; }
        #audit-log { color: #0088FF; font-size: 8px; height: 95px; overflow-y: auto; margin-top: 5px; background: rgba(0,255,65,0.05); padding: 4px; border: 1px solid #222; }
        #deck { width: 100%; height: 150px; background: #111; border-top: 4px solid #00FF41; position: fixed; bottom: 0; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-outer { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; display: flex; justify-content: center; align-items: center; background: #151515; cursor: pointer; position: relative; }
        .btn-inner { width: 35px; height: 35px; border-radius: 50%; background: #00FF41; border: 2px solid #000; }
        .btn-label { position: absolute; bottom: -18px; font-size: 8px; color: #666; width: 60px; text-align: center; }
        .spec-bar { position: absolute; bottom: 0; background: #00FF41; width: 8px; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <div id="monitor-border">
        <div id="ui">
            <div class="stat-row"><span>SYSTEM:</span><span>SULTAN_47_REV_LOAD</span></div>
            <div class="stat-row"><span>CLOCK:</span><span id="audio-time">0.000s</span></div>
            <div class="stat-row"><span>PHASE:</span><span id="phase-id">OUTER_CLOUD</span></div>
            <div class="stat-row"><span>PTR:</span><span id="point-idx">0 / 300</span></div>
            <div id="audit-log">READY_FOR_3_MP3_PASS...</div>
        </div>
        <div id="viewport"></div>
    </div>

    <div id="deck">
        <div class="btn-outer" onclick="start()"><div class="btn-inner"></div><div class="btn-label">START</div></div>
        <div class="btn-outer" onclick="audio.paused?audio.play():audio.pause()"><div class="btn-inner" style="background:#0088FF"></div><div class="btn-label">SYNC</div></div>
        <div class="btn-outer" onclick="exportLog()"><div class="btn-inner" style="background:#FFD700"></div><div class="btn-label">EXPORT</div></div>
        <div class="btn-outer" onclick="location.reload()"><div class="btn-inner" style="background:#444"></div><div class="btn-label">REBOOT</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 15000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(320, 320);
        document.getElementById('viewport').appendChild(renderer.domElement);
        camera.position.set(0, 800, 2000);
        camera.lookAt(0,0,0);

        const audio = new Audio('3.mp3');
        let audioCtx, analyser, dataArray;
        let spawnPtr = 0;
        let nextMarker = 0;
        const INTERVAL = 1.393;
        const TARGET_DUR = 1.393;
        const logData = [];
        let pointsInFlight = [];
        let activePoint = null;
        const specBars = [];

        // Reversed Data Stack
        const masterData = [
            ...window.SULTAN_DATA.outer, 
            ...window.SULTAN_DATA.middle, 
            ...window.SULTAN_DATA.inner
        ];

        // Visualizer Setup
        for(let i=0; i<32; i++) {
            const b = document.createElement('div');
            b.className = 'spec-bar';
            b.style.left = (i * 10) + 'px';
            document.getElementById('viewport').appendChild(b);
            specBars.push(b);
        }

        function writeLog(msg) {
            logData.push(msg);
            const d = document.createElement('div');
            d.innerText = msg;
            document.getElementById('audit-log').prepend(d);
        }

        function spawn() {
            if (spawnPtr >= 300) return;
            const raw = masterData[spawnPtr];
            
            // Unique Offset Logic: Data + 1000
            const target = new THREE.Vector3(raw.x, raw.y, raw.z);
            const origin = new THREE.Vector3(raw.x + 1000, raw.y + 1000, raw.z + 1000);

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(6, 8, 8), 
                new THREE.MeshBasicMaterial({ color: 0x00FF41, transparent: true })
            );
            mesh.position.copy(origin);
            
            mesh.userData = { 
                id: raw.i,
                origin: origin,
                target: target,
                startTime: audio.currentTime,
                state: 'INBOUND'
            };

            scene.add(mesh);
            pointsInFlight.push(mesh);
            spawnPtr++;
            
            // Phase Display
            let phase = "OUTER";
            if(spawnPtr > 100) phase = "MIDDLE";
            if(spawnPtr > 200) phase = "INNER";
            document.getElementById('phase-id').innerText = phase + "_CLOUD";
            document.getElementById('point-idx').innerText = `${spawnPtr} / 300`;
        }

        function start() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                audioCtx.createMediaElementSource(audio).connect(analyser).connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            writeLog("SYNC BEGUN: OUTER_START");
            audio.play();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                const now = audio.currentTime;
                document.getElementById('audio-time').innerText = now.toFixed(3) + "s";
                
                specBars.forEach((b, i) => b.style.height = (dataArray[i] / 2.5) + 'px');

                if (now >= nextMarker && spawnPtr < 300) { 
                    spawn(); 
                    nextMarker += INTERVAL; 
                }

                pointsInFlight.forEach((m, i) => {
                    const d = m.userData;
                    let timeFraction = (now - d.startTime) / TARGET_DUR;
                    if (timeFraction > 1) timeFraction = 1;

                    if (d.state === 'INBOUND') {
                        // Move from Unique Offset to Nest
                        m.position.lerpVectors(d.origin, d.target, timeFraction);
                        
                        if (timeFraction >= 1) {
                            d.state = 'STATIONARY';
                            writeLog(`[LAND] ID:${d.id} T:${now.toFixed(3)} DUR:${(now - d.startTime).toFixed(3)}`);
                            
                            // DISPLACEMENT: Physical Kick Out
                            if (activePoint && activePoint.userData.id !== d.id) {
                                activePoint.userData.state = 'OUTBOUND';
                                activePoint.userData.returnStart = now;
                            }
                            activePoint = m;
                        }
                    } else if (d.state === 'OUTBOUND') {
                        let outFraction = (now - d.returnStart) / TARGET_DUR;
                        if (outFraction > 1) outFraction = 1;
                        
                        // Physical return to Unique Offset
                        m.position.lerpVectors(d.target, d.origin, outFraction);
                        m.material.opacity = 1 - outFraction;
                        
                        if (outFraction >= 1) {
                            writeLog(`[RETURN] ID:${d.id} DUR:${(now - d.returnStart).toFixed(3)}`);
                            scene.remove(m);
                            pointsInFlight.splice(i, 1);
                        }
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();

        function exportLog() {
            const blob = new Blob([logData.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = 'SULTAN_47_COMPLETE_AUDIT.txt';
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }
    </script>
</body>
</html>
