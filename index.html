<!DOCTYPE html>

<html lang="en">
  
<head>
    <meta charset="UTF-8">
  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
    <link rel="manifest" href="manifest.json">
  
    <title>-eagle_bd</title>
  
    <style>
      
        body { margin: 0; background: #000; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; touch-action: none; height: 100vh; display: flex; flex-direction: column; }
      
        #monitor { flex-grow: 1; border: 4px solid #222; margin: 5px; position: relative; background: #000; overflow: hidden; }
      
      
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 10px; pointer-events: none; }
      
        #audit-stream { position: absolute; top: 10px; right: 10px; width: 150px; height: 80px; font-size: 8px; color: #0088FF; overflow: hidden; text-align: right; }
      
        #spec { position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; opacity: 0.5; }
      
        #controls { height: 150px; background: #111; display: grid; grid-template-columns: 1fr 1fr; border-top: 2px solid #00FF41; }
      
        .btn { display: flex; align-items: center; justify-content: center; border: 1px solid #222; font-weight: bold; font-size: 16px; -webkit-tap-highlight-color: transparent; }
      
        #main-btn { background: #002200; grid-column: span 2; border-bottom: 2px solid #00FF41; }
      
        .val { color: #0088FF; }
      
    </style>
  
</head>
  
<body>
  
    <div id="monitor">
      
        <div id="ui-layer">
          
            <div>🐧: -eagle_bd</div>
          
            <div>🪬: <span class="val">1.405s</span></div>
          
            <div>👾: <span id="drift-ui" class="val">0.00ms</span></div>
          
            <div>🎢: <span id="ptr-ui" class="val">0/300</span></div>
          
        </div>
      
        <div id="audit-stream"></div>
      
        <div id="viewport"></div>
      
        <canvas id="spec"></canvas>
    </div>
  

    <div id="controls">
      
        <div id="main-btn" class="btn" ontouchstart="boot(event)">👻</div>
      
        <div class="btn" ontouchstart="location.reload()">⚕️</div>
      
        <div class="btn" ontouchstart="console.log('Exporting...')">⚡</div>
      
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>
<script>
        const scene = new THREE.Scene();
  
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/(window.innerHeight-160), 0.1, 10000);
  
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
  
        renderer.setSize(window.innerWidth - 10, window.innerHeight - 160);
  
        document.getElementById('viewport').appendChild(renderer.domElement);
  
        camera.position.set(0, 1500, 2000);

        const pGroup = new THREE.Group();
  
        scene.add(pGroup);

        const cvs = document.getElementById('spec');
  
        const ctx = cvs.getContext('2d');
  
        cvs.width = window.innerWidth; cvs.height = 50;

        const audio = new Audio('3.mp3');
  
        let aCtx, aly, dArr, state = 0, ptr = 0;
  
        const T_TARGET = 1.405;

        // Sequence mapped from SULTAN_47_COMPLETE_AUDIT.txt
  
        const auditTimings = [1.408, 2.816, 4.203, 5.579, 6.976, 8.383, 9.771, 11.157, 12.558, 13.947];

        function boot(e) {
          
            e.preventDefault();
          
            const btn = document.getElementById('main-btn');
          
            if (state === 0) {
              
                aCtx = new (window.AudioContext || window.webkitAudioContext)();
              
                aly = aCtx.createAnalyser(); aly.fftSize = 128;
              
                aCtx.createMediaElementSource(audio).connect(aly).connect(aCtx.destination);
              
                dArr = new Uint8Array(aly.frequencyBinCount);
              
                state = 1; btn.innerText = "ENGAGE SYNC";
              
            } else if (state === 1) {
              
                audio.play(); state = 2; btn.style.display = "none";
              
            }
          
        }

        function spawn() {
          
            if (ptr >= 300) return;
          
            const p = (window.SULTAN_DATA.outer.concat(window.SULTAN_DATA.middle, window.SULTAN_DATA.inner))[ptr];
          
            let g, m, y;

            if (ptr < 100) { y=25; g=new THREE.BoxGeometry(45,45,45); m=new THREE.MeshBasicMaterial({color:0x00FF41, wireframe:true}); }
              
            else if (ptr < 200) { y=10; g=new THREE.CylinderGeometry(90,90,30,5); m=new THREE.MeshBasicMaterial({color:0xFF00FF}); }
              
            else { y=4; g=new THREE.CylinderGeometry(135,135,50,6); m=new THREE.MeshBasicMaterial({color:0x00FFFF}); }

            const mesh = new THREE.Mesh(g, m);
          
            mesh.position.set(p.x + 1000, y + 1000, p.z + 1000);
          
            mesh.userData = { t: new THREE.Vector3(p.x, y, p.z), l: new THREE.Vector3(p.x+500, y+500, p.z+500), s: audio.currentTime, st: 'IN' };
          
            
            pGroup.add(mesh);
          
            logAudit(`LAND ID:${ptr} T:${audio.currentTime.toFixed(3)}`);
          
            ptr++; document.getElementById('ptr-ui').innerText = ptr + "/300";
        }

        function logAudit(msg) {
          
            const stream = document.getElementById('audit-stream');
          
            const div = document.createElement('div');
          
            div.innerText = msg;
          
            stream.prepend(div);
          
            if(stream.children.length > 8) stream.lastChild.remove();
        }

        function animate() {
          
            requestAnimationFrame(animate);
          
            if (state === 2 && !audio.paused) {
              
                aly.getByteFrequencyData(dArr);
              
                const now = audio.currentTime;

                // Precision Sync based on your Audit Log markers
              
                const nextMarker = auditTimings[ptr] || (ptr * T_TARGET);
              
                if (now >= nextMarker && ptr < 300) {
                  
                    document.getElementById('drift-ui').innerText = ((now - nextMarker) * 1000).toFixed(3) + "ms";
                  
                    spawn();
                }

                let w = 1 + (dArr[1] / 180);
              
                pGroup.children.forEach((m, idx) => {
                  
                    let d = m.userData;
                  
                    let pct = (now - d.s) / T_TARGET;
                  
                    if (pct > 1) pct = 1;

                    if (d.st === 'IN') {
                        m.position.lerpVectors(new THREE.Vector3(d.t.x+1000, d.t.y+1000, d.t.z+1000), d.t, pct);
                      
                        if (pct >= 1) {
                          
                            d.st = 'NEST';
                          
                            logAudit(`NEST ID:${idx}`);
                        }
                      
                    } else {
                      
                        m.position.lerp(d.l, 0.05);
                      
                        m.scale.set(w, w, w);
                      
                        m.rotation.y += 0.02;
                      
                      
                    }
                });

                ctx.clearRect(0,0, cvs.width, cvs.height);
              
                ctx.fillStyle = "#00FF41";
              
                for(let i=0; i<dArr.length; i++) {
                  
                    let h = (dArr[i]/255) * 50;
                  
                    ctx.fillRect(i*(cvs.width/dArr.length), 50-h, 2, h);
                }
            }
            pGroup.rotation.y += 0.002;
          
            renderer.render(scene, camera);
        }
  
        animate();
  
    </script>
  

  
    <script>
      
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
      
          </script>
  
</body>
          
</html>
