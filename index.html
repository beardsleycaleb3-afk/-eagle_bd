<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBM - Sultan 47 Forensic Audit</title>
    <style>
        body { margin: 0; background: #010801; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #monitor-border { border: 12px solid #222; border-radius: 20px; padding: 10px; background: #000; box-shadow: 0 0 50px rgba(0, 255, 65, 0.2); position: relative; margin-bottom: 160px; }
        #viewport { width: 320px; height: 320px; overflow: hidden; border: 1px solid #00FF41; background: #000; position: relative; }
        
        #ui { position: absolute; top: -150px; left: 0; width: 320px; font-size: 9px; line-height: 1.2; }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 2px 0; }
        #audit-log { color: #0088FF; font-size: 8px; height: 85px; overflow-y: auto; margin-top: 5px; background: rgba(0,255,65,0.05); padding: 4px; border: 1px solid #222; }
        
        #deck { width: 100%; height: 150px; background: #111; border-top: 4px solid #00FF41; position: fixed; bottom: 0; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-outer { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; display: flex; justify-content: center; align-items: center; background: #151515; cursor: pointer; position: relative; }
        .btn-inner { width: 35px; height: 35px; border-radius: 50%; background: #00FF41; border: 2px solid #000; }
        .btn-label { position: absolute; bottom: -18px; font-size: 8px; color: #666; width: 60px; text-align: center; }
        
        .spec-bar { position: absolute; bottom: 0; background: #00FF41; width: 4px; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div id="monitor-border">
        <div id="ui">
            <div class="stat-row"><span>LOGIC_ENGINE:</span><span>GLYPHFOLD_DBM</span></div>
            <div class="stat-row"><span>SYNC_LATENCY:</span><span id="lat-val">0.00ms</span></div>
            <div class="stat-row"><span>BIT_COMPRESSION:</span><span>3000:1</span></div>
            <div class="stat-row"><span>SHELL_STATUS:</span><span id="shell-status">LOCKED</span></div>
            <div id="audit-log">INIT: STANDBY FOR COORDINATE INJECTION...</div>
        </div>
        <div id="viewport"></div>
    </div>

    <div id="deck">
        <div class="btn-outer" onclick="initAndDrop()"><div class="btn-inner"></div><div class="btn-label">DROP</div></div>
        <div class="btn-outer" onclick="toggleAudio()"><div class="btn-inner" style="background:#0088FF"></div><div class="btn-label">SYNC</div></div>
        <div class="btn-outer" onclick="downloadAudit()"><div class="btn-inner" style="background:#FFD700"></div><div class="btn-label">EXPORT</div></div>
        <div class="btn-outer" onclick="location.reload()"><div class="btn-inner" style="background:#444"></div><div class="btn-label">REBOOT</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(320, 320);
        document.getElementById('viewport').appendChild(renderer.domElement);
        camera.position.set(0, 30, 200);

        const pGroup = new THREE.Group();
        scene.add(pGroup);

        const audio = new Audio('3.mp3');
        let audioCtx, analyser, dataArray, isActive = false;
        const log = document.getElementById('audit-log');
        const sessionData = []; // Full audit storage
        const landingTimes = { outer: null, middle: null, inner: null };

        function writeLog(msg) {
            const time = audioCtx ? audioCtx.currentTime.toFixed(3) : "0.000";
            const entry = document.createElement('div');
            entry.innerText = `[T+${time}] ${msg}`;
            log.prepend(entry);
            sessionData.push(`[${time}] ${msg}`);
        }

        const specBars = [];
        for(let i=0; i<32; i++) {
            const b = document.createElement('div');
            b.className = 'spec-bar';
            b.style.left = (i * 10) + 'px';
            document.getElementById('viewport').appendChild(b);
            specBars.push(b);
        }

        function makeShell(data, color, sz, type) {
            if(!data) return new THREE.Group();
            const g = new THREE.Group();
            data.slice(0, 100).forEach(p => {
                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(sz, 6, 6),
                    new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 })
                );
                mesh.position.set(p.x + 1000, p.y + 1000, p.z + 1000);
                mesh.userData = { target: new THREE.Vector3(p.x, p.y, p.z), type: type, id: p.i };
                g.add(mesh);
            });
            return g;
        }

        window.addEventListener('load', () => {
            if(window.SULTAN_DATA) {
                pGroup.add(makeShell(window.SULTAN_DATA.outer, 0x00FF41, 1.0, 'outer'));
                pGroup.add(makeShell(window.SULTAN_DATA.middle, 0x0088FF, 0.8, 'middle'));
                pGroup.add(makeShell(window.SULTAN_DATA.inner, 0xFF00FF, 0.6, 'inner'));
                writeLog("DATA_LOAD: 300 COORDINATES READY AT +1000 XYZ");
            }
        });

        function initAndDrop() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            isActive = true;
            audio.play();
            writeLog("SEQUENCE_START: COLLAPSE INITIATED");
        }

        function toggleAudio() { (audio.paused) ? audio.play() : audio.pause(); }

        function downloadAudit() {
            const blob = new Blob([sessionData.join('\n')], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = `DBM_AUDIT_${Date.now()}.txt`;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }

        function animate() {
            requestAnimationFrame(animate);
            let kick = 0, mids = 0;
            
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                kick = dataArray[2];
                mids = dataArray[12];
                specBars.forEach((b, i) => b.style.height = (dataArray[i] / 2) + 'px');
                document.getElementById('lat-val').innerText = (audioCtx.currentTime * 1000).toFixed(2) + "ms";
            }

            pGroup.children.forEach((shell) => {
                let shellLanded = true;
                const type = shell.children[0]?.userData.type;

                shell.children.forEach((m) => {
                    const d = m.userData;
                    if (isActive) {
                        const dist = m.position.distanceTo(d.target);
                        if (dist > 0.5) {
                            m.position.lerp(d.target, 0.01 + (mids / 4000));
                            shellLanded = false;
                        } else {
                            m.scale.setScalar(1 + (kick / 255) * 0.4);
                        }
                    }
                });

                if (isActive && shellLanded && !landingTimes[type]) {
                    landingTimes[type] = audioCtx.currentTime.toFixed(3);
                    writeLog(`PHASE_LOCK: ${type.toUpperCase()} SHELL ARRIVED`);
                    document.getElementById('shell-status').innerText = `${type.toUpperCase()}_OK`;
                }
            });

            pGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
