<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBM - Sultan 47 Timed Sync</title>
    <style>
        body { margin: 0; background: #010801; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
        #monitor-border { border: 12px solid #222; border-radius: 20px; padding: 10px; background: #000; box-shadow: 0 0 50px rgba(0, 255, 65, 0.2); position: relative; margin-bottom: 160px; }
        #viewport { width: 320px; height: 320px; overflow: hidden; border: 1px solid #00FF41; background: #000; position: relative; }
        #ui { position: absolute; top: -150px; left: 0; width: 320px; font-size: 9px; line-height: 1.2; }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 2px 0; }
        #audit-log { color: #0088FF; font-size: 8px; height: 95px; overflow-y: auto; margin-top: 5px; background: rgba(0,255,65,0.05); padding: 4px; border: 1px solid #222; }
        #deck { width: 100%; height: 150px; background: #111; border-top: 4px solid #00FF41; position: fixed; bottom: 0; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-outer { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; display: flex; justify-content: center; align-items: center; background: #151515; cursor: pointer; position: relative; }
        .btn-inner { width: 35px; height: 35px; border-radius: 50%; background: #00FF41; border: 2px solid #000; }
        .btn-label { position: absolute; bottom: -18px; font-size: 8px; color: #666; width: 60px; text-align: center; }
        .spec-bar { position: absolute; bottom: 0; background: #00FF41; width: 4px; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div id="monitor-border">
        <div id="ui">
            <div class="stat-row"><span>LOGIC_ENGINE:</span><span>GLYPHFOLD_SYNC_V2</span></div>
            <div class="stat-row"><span>SONG_LENGTH:</span><span id="dur-val">---</span></div>
            <div class="stat-row"><span>SPAWN_RATE:</span><span id="rate-val">CALC...</span></div>
            <div class="stat-row"><span>PROGRESS:</span><span id="point-idx">0 / 300</span></div>
            <div id="audit-log">INIT: CALCULATING SYNC RATIO...</div>
        </div>
        <div id="viewport"></div>
    </div>

    <div id="deck">
        <div class="btn-outer" onclick="initAndStartSequence()"><div class="btn-inner"></div><div class="btn-label">START_SEQ</div></div>
        <div class="btn-outer" onclick="toggleAudio()"><div class="btn-inner" style="background:#0088FF"></div><div class="btn-label">SYNC</div></div>
        <div class="btn-outer" onclick="downloadAudit()"><div class="btn-inner" style="background:#FFD700"></div><div class="btn-label">EXPORT</div></div>
        <div class="btn-outer" onclick="location.reload()"><div class="btn-inner" style="background:#444"></div><div class="btn-label">REBOOT</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(320, 320);
        document.getElementById('viewport').appendChild(renderer.domElement);
        camera.position.set(0, 30, 250);

        const pGroup = new THREE.Group();
        scene.add(pGroup);

        const audio = new Audio('3.mp3');
        let audioCtx, analyser, dataArray;
        let isRunning = false;
        let allPointsData = []; 
        let currentPointIndex = 0;
        let spawnInterval = 0;
        let lastSpawnTime = 0;
        const sessionData = [];
        const log = document.getElementById('audit-log');

        function writeLog(msg) {
            const entry = document.createElement('div');
            entry.innerText = msg;
            log.prepend(entry);
            sessionData.push(msg);
        }

        window.addEventListener('load', () => {
            if(window.SULTAN_DATA) {
                ['inner', 'middle', 'outer'].forEach(s => {
                    window.SULTAN_DATA[s].slice(0, 100).forEach(p => {
                        allPointsData.push({ ...p, type: s });
                    });
                });
                audio.onloadedmetadata = () => {
                    const totalSec = audio.duration;
                    spawnInterval = totalSec / 300; // THE SYNC RATIO
                    document.getElementById('dur-val').innerText = totalSec.toFixed(1) + "s";
                    document.getElementById('rate-val').innerText = spawnInterval.toFixed(3) + "s";
                    writeLog("SYNC_CALC: INTERVAL SET TO " + spawnInterval.toFixed(3));
                };
            }
        });

        function spawnPoint() {
            if (currentPointIndex >= 300) return;
            const p = allPointsData[currentPointIndex];
            const colors = { inner: 0xFF00FF, middle: 0x0088FF, outer: 0x00FF41 };
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(1.5, 6, 6), new THREE.MeshBasicMaterial({ color: colors[p.type] }));
            mesh.position.set(p.x + 1000, p.y + 1000, p.z + 1000);
            mesh.userData = { target: new THREE.Vector3(p.x, p.y, p.z), spawnTime: audio.currentTime, id: p.i, type: p.type, landed: false };
            pGroup.add(mesh);
            currentPointIndex++;
            document.getElementById('point-idx').innerText = `${currentPointIndex} / 300`;
        }

        function initAndStartSequence() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            isRunning = true;
            audio.play();
            writeLog("SEQUENCE_START: TIME-RATIO ENGAGED");
        }

        function toggleAudio() { (audio.paused) ? audio.play() : audio.pause(); }

        function downloadAudit() {
            const blob = new Blob([sessionData.join('\n')], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = `SULTAN_SYNC_AUDIT.txt`;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }

        function animate() {
            requestAnimationFrame(animate);
            let mids = 0;
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                mids = dataArray[12];
                
                // AUTOMATED SPAWN LOGIC: Check if it's time for the next point based on audio clock
                if (isRunning && (audio.currentTime - lastSpawnTime >= spawnInterval)) {
                    spawnPoint();
                    lastSpawnTime = audio.currentTime;
                }
            }

            pGroup.children.forEach((m) => {
                const d = m.userData;
                if (!d.landed) {
                    const dist = m.position.distanceTo(d.target);
                    if (dist > 1.0) {
                        // CURVATURE TRAVEL
                        const speed = 0.04 + (mids / 1500);
                        m.position.x = THREE.MathUtils.lerp(m.position.x, d.target.x, speed * 1.2);
                        m.position.y = THREE.MathUtils.lerp(m.position.y, d.target.y, speed * 0.8);
                        m.position.z = THREE.MathUtils.lerp(m.position.z, d.target.z, speed * 1.1);
                    } else {
                        d.landed = true;
                        const dur = (audio.currentTime - d.spawnTime).toFixed(3);
                        writeLog(`[${d.type.toUpperCase()}] ID:${d.id} | DUR:${dur}s | T:${audio.currentTime.toFixed(2)}`);
                    }
                }
            });

            pGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
