<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sultan 47 - Calibration 4.mp3</title>
    <style>
        body { margin: 0; background: #010801; overflow: hidden; color: #00FF41; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
        #monitor-border { border: 12px solid #222; border-radius: 20px; padding: 10px; background: #000; box-shadow: 0 0 50px rgba(0, 255, 65, 0.2); position: relative; margin-bottom: 160px; }
        #viewport { width: 320px; height: 320px; overflow: hidden; border: 1px solid #00FF41; background: #000; position: relative; }
        #ui { position: absolute; top: -150px; left: 0; width: 320px; font-size: 9px; line-height: 1.2; }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 2px 0; }
        #audit-log { color: #0088FF; font-size: 8px; height: 95px; overflow-y: auto; margin-top: 5px; background: rgba(0,255,65,0.05); padding: 4px; border: 1px solid #222; }
        #deck { width: 100%; height: 150px; background: #111; border-top: 4px solid #00FF41; position: fixed; bottom: 0; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-outer { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; display: flex; justify-content: center; align-items: center; background: #151515; cursor: pointer; position: relative; }
        .btn-inner { width: 35px; height: 35px; border-radius: 50%; background: #00FF41; border: 2px solid #000; }
        .btn-label { position: absolute; bottom: -18px; font-size: 8px; color: #666; width: 60px; text-align: center; }
        .spec-bar { position: absolute; bottom: 0; background: #00FF41; width: 4px; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <div id="monitor-border">
        <div id="ui">
            <div class="stat-row"><span>CALIBRATION_TARGET:</span><span>4.mp3</span></div>
            <div class="stat-row"><span>CLOCK:</span><span id="audio-time">0.000s</span></div>
            <div class="stat-row"><span>POINT:</span><span id="point-idx">0 / 300</span></div>
            <div id="audit-log">READY FOR SYNC PULSE...</div>
        </div>
        <div id="viewport"></div>
    </div>

    <div id="deck">
        <div class="btn-outer" onclick="start()"><div class="btn-inner"></div><div class="btn-label">START</div></div>
        <div class="btn-outer" onclick="audio.paused?audio.play():audio.pause()"><div class="btn-inner" style="background:#0088FF"></div><div class="btn-label">SYNC</div></div>
        <div class="btn-outer" onclick="exportLog()"><div class="btn-inner" style="background:#FFD700"></div><div class="btn-label">EXPORT</div></div>
        <div class="btn-outer" onclick="location.reload()"><div class="btn-inner" style="background:#444"></div><div class="btn-label">REBOOT</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="points.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(320, 320);
        document.getElementById('viewport').appendChild(renderer.domElement);
        camera.position.set(0, 30, 250);

        const pGroup = new THREE.Group();
        scene.add(pGroup);

        const audio = new Audio('4.mp3');
        let audioCtx, analyser, dataArray;
        let isRunning = false;
        let allPoints = []; 
        let spawnPtr = 0;
        let nextMarker = 0;
        const interval = 1.3933; 
        const logData = [];
        const specBars = [];

        for(let i=0; i<32; i++) {
            const b = document.createElement('div');
            b.className = 'spec-bar';
            b.style.left = (i * 10) + 'px';
            document.getElementById('viewport').appendChild(b);
            specBars.push(b);
        }

        window.addEventListener('load', () => {
            if(window.SULTAN_DATA) {
                ['inner', 'middle', 'outer'].forEach(s => {
                    window.SULTAN_DATA[s].slice(0, 100).forEach(p => allPoints.push({ ...p, type: s }));
                });
            }
        });

        function spawn() {
            if (spawnPtr >= 300) return;
            const p = allPoints[spawnPtr];
            const colors = { inner: 0xFF00FF, middle: 0x0088FF, outer: 0x00FF41 };
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), new THREE.MeshBasicMaterial({ color: colors[p.type] }));
            mesh.position.set(p.x + 1000, p.y + 1000, p.z + 1000);
            mesh.userData = { target: new THREE.Vector3(p.x, p.y, p.z), spawnTime: audio.currentTime, id: p.i, type: p.type, landed: false };
            pGroup.add(mesh);
            spawnPtr++;
            document.getElementById('point-idx').innerText = `${spawnPtr} / 300`;
        }

        function start() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            isRunning = true;
            audio.play();
            nextMarker = 0;
        }

        function exportLog() {
            const blob = new Blob([logData.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `SULTAN_4MP3_CALIBRATION.txt`;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }

        function animate() {
            requestAnimationFrame(animate);
            let freqPower = 0;
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                freqPower = dataArray[12]; 
                document.getElementById('audio-time').innerText = audio.currentTime.toFixed(3) + "s";
                specBars.forEach((b, i) => b.style.height = (dataArray[i] / 2) + 'px');

                if (audio.currentTime >= nextMarker && spawnPtr < 300) {
                    spawn();
                    nextMarker += interval;
                }
            }

            pGroup.children.forEach((m) => {
                const d = m.userData;
                if (!d.landed) {
                    const dist = m.position.distanceTo(d.target);
                    if (dist > 1.0) {
                        const drive = 0.05 + (freqPower / 1200);
                        m.position.lerp(d.target, drive);
                    } else {
                        d.landed = true;
                        const entry = `[${d.type.toUpperCase()}] ID:${d.id} | DUR:${(audio.currentTime - d.spawnTime).toFixed(3)}s | T:${audio.currentTime.toFixed(2)}`;
                        logData.push(entry);
                        document.getElementById('audit-log').prepend(Object.assign(document.createElement('div'), {innerText: entry}));
                    }
                }
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
